name: Deploy backend to ECR + ECS

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
      - "infra/ecs-task-definition.template.json"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write          # OIDC → assume the AWS role
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_BACKEND }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO:     ${{ secrets.ECR_REPOSITORY }}
          SHA:      ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${REGISTRY}/${REPO}:${SHA::8}"
          LATEST_URI="${REGISTRY}/${REPO}:latest"
          docker build \
              --platform linux/amd64 \
              --tag "$IMAGE_URI" \
              --tag "$LATEST_URI" \
              -f backend/Dockerfile backend
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: render
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"

          # Fill in the placeholders. The template keeps every ENV / secret
          # reference in one place — this step only rewrites paths.
          sed \
            -e "s|<ACCOUNT_ID>|${ACCOUNT_ID}|g" \
            -e "s|<REGION>|${REGION}|g" \
            -e "s|<TASK_EXECUTION_ROLE_ARN>|${{ secrets.TASK_EXECUTION_ROLE_ARN }}|g" \
            -e "s|<TASK_ROLE_ARN>|${{ secrets.TASK_ROLE_ARN }}|g" \
            -e "s|<IMAGE_URI>|${{ steps.build.outputs.image }}|g" \
            -e "s|<ALLOWED_ORIGINS>|${{ secrets.ALLOWED_ORIGINS }}|g" \
            infra/ecs-task-definition.template.json > taskdef.rendered.json

          cat taskdef.rendered.json

      - name: Register the new task definition
        id: register
        run: |
          set -euo pipefail
          ARN=$(aws ecs register-task-definition \
              --cli-input-json file://taskdef.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
              --cluster "${{ secrets.ECS_CLUSTER }}" \
              --service "${{ secrets.ECS_SERVICE }}" \
              --task-definition "${{ steps.register.outputs.arn }}" \
              --force-new-deployment >/dev/null

      - name: Wait for deployment to stabilise
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
              --cluster "${{ secrets.ECS_CLUSTER }}" \
              --services "${{ secrets.ECS_SERVICE }}"
