name: Android — Build & Deploy to Google Play

on:
  push:
    branches: [main, updated]
    paths:
      - 'android_app/**'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  deploy:
    name: Build signed AAB & upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Keystore faylini tiklash
        run: |
          mkdir -p android_app/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android_app/app/keystore/udx-release.jks

      - name: versionCode hisoblash (run number asosida)
        id: version
        run: echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Gradlew ijro huquqi
        run: chmod +x android_app/gradlew

      - name: Release AAB build
        working-directory: android_app
        env:
          KEYSTORE_PATH:     app/keystore/udx-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE:      ${{ steps.version.outputs.code }}
          VERSION_NAME:      ${{ vars.VERSION_NAME || '1.0' }}
        run: ./gradlew bundleRelease --no-daemon

      - name: AAB faylini artefakt sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: udx-release-${{ steps.version.outputs.code }}.aab
          path: android_app/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Google Play ga yuklash
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName:                 com.udx.app
          releaseFiles:                android_app/app/build/outputs/bundle/release/app-release.aab
          track:                       ${{ inputs.track || 'internal' }}
          status:                      completed

      - name: Keystore faylini o'chirish
        if: always()
        run: rm -f android_app/app/keystore/udx-release.jks
