name: Android — Firebase App Distribution

on:
  push:
    branches: [main, updated]
    paths:
      - 'android_app/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (testerlar ko'radi)'
        required: false
        default: 'Yangi build'
      testers_group:
        description: 'Tester guruhi'
        required: false
        default: 'qa-team'

jobs:
  distribute:
    name: Build debug APK & distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradlew ijro huquqi
        run: chmod +x android_app/gradlew

      - name: versionCode hisoblash
        id: version
        run: echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Debug APK build
        working-directory: android_app
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ vars.VERSION_NAME || '1.0' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: APK yo'lini aniqlash
        id: apk
        run: |
          APK=$(find android_app/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: APK artefakt sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: udx-debug-${{ steps.version.outputs.code }}.apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      - name: Firebase App Distribution ga yuklash
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups:      ${{ inputs.testers_group || 'qa-team' }}
          file:        ${{ steps.apk.outputs.path }}
          releaseNotes: |
            ${{ inputs.release_notes || format('Build #{0} — branch: {1}', github.run_number, github.ref_name) }}
            Commit: ${{ github.sha }}
