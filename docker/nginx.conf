# UDX frontend reverse-proxy config.
#
# Serves the built Vite bundle and proxies API + WebSocket traffic to
# the backend container, so the browser only ever talks to a single
# origin. That kills the whole CORS-in-prod class of bugs.

# Turn on gzip for the JSON API and the static bundle.
gzip on;
gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/xml
    image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;

upstream udx_backend {
    server backend:8000;
    # Small keepalive pool so short-lived Vite fetches don't churn TCP.
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Never advertise the exact version.
    server_tokens off;

    # Small safety headers. TLS + HSTS belong on the load-balancer /
    # ingress in front of us — don't set HSTS here to avoid pinning a
    # bad cert during a dev deploy.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Health probe used by the compose healthcheck ─────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # ── API — strip /api/ then forward to FastAPI ────────────────────
    # Frontend fetches like /api/token → backend sees /token.
    location /api/ {
        proxy_pass         http://udx_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket chat ──────────────────────────────────────────────
    # Nginx needs the Upgrade + Connection headers explicitly.
    location /ws/ {
        proxy_pass         http://udx_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Chat sockets stay open for a while; bump timeouts.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── User uploads (only used when R2 is not configured) ──────────
    location /uploads/ {
        proxy_pass         http://udx_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static bundle · SPA fallback ────────────────────────────────
    # Cache hashed asset filenames aggressively; index.html is short-TTL
    # so a redeploy is picked up immediately.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
