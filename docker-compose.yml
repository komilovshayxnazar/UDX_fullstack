# UDX full stack in one compose file.
#
#   docker compose --env-file .env.docker up -d
#
# Services:
#   mongo    — primary DB
#   redis    — OTP / CSRF / cache store (REQUIRED in production per audit)
#   neo4j    — optional graph DB for the recommender (comment out to skip)
#   backend  — FastAPI + Motor
#   frontend — Nginx serving the built Vite bundle + reverse-proxying
#              /api/* and /ws/* to the backend, so browsers see a
#              single origin (fewer CORS holes).
#
# NOTE: We intentionally do NOT bind runtime state (verified_sessions
# JSON, telegram_*.json, uploads/) into the source tree. All of those
# live inside named volumes so a `git status` in the working copy stays
# clean even after the stack has been running.

services:

  mongo:
    image: mongo:7
    container_name: udx-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-udx}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-udx}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [udx]

  redis:
    image: redis:7-alpine
    container_name: udx-redis
    restart: unless-stopped
    # Require a password so a leaked network exposes nothing usable.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

  neo4j:
    image: neo4j:5-community
    container_name: udx-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Uncomment to expose the browser + Bolt on the host:
    # ports:
    #   - "7474:7474"
    #   - "7687:7687"
    networks: [udx]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: udx-backend:latest
    container_name: udx-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      # Wired into fail-closed startup checks (see backend/main.py)
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars)}
      HMAC_KEY: ${HMAC_KEY:?HMAC_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # Wired to the services above using their compose hostnames.
      MONGODB_URL: "mongodb://${MONGO_ROOT_USER:-udx}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-udx}?authSource=admin"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # Frontend + Nginx share the same origin, so allow that host only.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://udx-marketplace.store}

      # Optional integrations (empty → feature disabled at runtime)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      CLICK_MERCHANT_USER_ID: ${CLICK_MERCHANT_USER_ID:-}
      CLICK_RETURN_URL: ${CLICK_RETURN_URL:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      PAYMENT_GATEWAY_URL: ${PAYMENT_GATEWAY_URL:-}
      PAYMENT_ALLOW_MOCK: ${PAYMENT_ALLOW_MOCK:-}
      DEV_ADMIN_TOKEN: ${DEV_ADMIN_TOKEN:-}
    volumes:
      # Local uploads only used when R2 is not configured; keeps them
      # out of the image + out of the working tree.
      - backend-uploads:/app/uploads
      # OTP fallback + Telegram chat-id JSONs (Redis is authoritative in prod)
      - backend-state:/app/state
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [udx]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Same-origin API — Nginx below reverse-proxies /api/* and /ws/*
        # to backend:8000, so the browser only ever talks to this host.
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: udx-frontend:latest
    container_name: udx-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

volumes:
  mongo-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  backend-uploads:
  backend-state:

networks:
  udx:
    driver: bridge
