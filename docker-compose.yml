# UDX full stack in one compose file.
#
#   docker compose --env-file .env.docker up -d
#
# Services:
#   postgres      — primary DB (PostgreSQL 16), schema owned by Alembic
#   redis         — CSRF / general cache store, secondary OTP/session
#                    fallback behind memdb (REQUIRED in production per audit)
#   memdb         — in-memory KV store + WAL (services/memdb); primary
#                    durable OTP/session/token store for backend
#   backend       — FastAPI + SQLAlchemy (async) + asyncpg
#   gateway       — Go reverse-proxy gateway (services/dyn-gateway) in
#                    front of backend: token-bucket rate limiting + a
#                    load-adaptive circuit breaker that trips on upstream
#                    5xx ratio
#   logagg-server — Distributed Log Aggregator central server (gRPC ingest +
#                    WAL + chunk store + inverted index)
#   logagg-agent  — tails backend's JSON-line log file and streams it to
#                    logagg-server
#   frontend      — Nginx serving the built Vite bundle + reverse-proxying
#                    /api/* to the gateway and /ws/*, /uploads/* directly to
#                    the backend, so browsers see a single origin (fewer
#                    CORS holes).
#
# NOTE: We intentionally do NOT bind runtime state (verified_sessions
# JSON, telegram_*.json, uploads/) into the source tree. All of those
# live inside named volumes so a `git status` in the working copy stays
# clean even after the stack has been running.

services:

  postgres:
    image: postgres:16-alpine
    container_name: udx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-udx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-udx}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-udx} -d ${POSTGRES_DB:-udx}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [udx]

  redis:
    image: redis:7-alpine
    container_name: udx-redis
    restart: unless-stopped
    # Require a password so a leaked network exposes nothing usable.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

  memdb:
    build:
      context: ./services/memdb
      dockerfile: Dockerfile
    image: udx-memdb:latest
    container_name: udx-memdb
    restart: unless-stopped
    command:
      - "--addr=:5455"
      - "--data=/app/data"
      - "--sync=interval"
      - "--auto-snapshot=5m"
    volumes:
      - memdb-data:/app/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5455"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: udx-backend:latest
    container_name: udx-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      memdb:
        condition: service_healthy
    environment:
      # Wired into fail-closed startup checks (see backend/main.py)
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars)}
      HMAC_KEY: ${HMAC_KEY:?HMAC_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # Wired to the services above using their compose hostnames.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-udx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-udx}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      MEMDB_HOST: memdb
      MEMDB_PORT: "5455"

      # Distributed Log Aggregator — backend writes JSON-line logs here;
      # logagg-agent tails the same path via the shared backend-logs volume.
      LOG_FILE: /app/logs/app.jsonl
      LOGAGG_COMPONENT: udx-backend

      # Frontend + Nginx share the same origin, so allow that host only.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://udx-marketplace.store}

      # Optional integrations (empty → feature disabled at runtime)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      CLICK_MERCHANT_USER_ID: ${CLICK_MERCHANT_USER_ID:-}
      CLICK_RETURN_URL: ${CLICK_RETURN_URL:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      PAYMENT_GATEWAY_URL: ${PAYMENT_GATEWAY_URL:-}
      PAYMENT_ALLOW_MOCK: ${PAYMENT_ALLOW_MOCK:-}
      DEV_ADMIN_TOKEN: ${DEV_ADMIN_TOKEN:-}
    volumes:
      # Local uploads only used when R2 is not configured; keeps them
      # out of the image + out of the working tree.
      - backend-uploads:/app/uploads
      # OTP fallback + Telegram chat-id JSONs (memdb is authoritative in prod)
      - backend-state:/app/state
      # JSON-line app log, tailed by logagg-agent (see LOG_FILE above)
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [udx]

  gateway:
    build:
      context: ./services/dyn-gateway
      dockerfile: Dockerfile
    image: udx-gateway:latest
    container_name: udx-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command:
      - "--addr=:8080"
      - "--upstream=http://backend:8000"
      - "--rate=${GATEWAY_RATE:-20}"
      - "--burst=${GATEWAY_BURST:-40}"
      - "--cb-min=${GATEWAY_CB_MIN_REQUESTS:-5}"
      - "--cb-ratio=${GATEWAY_CB_FAILURE_RATIO:-0.5}"
      - "--cb-window=${GATEWAY_CB_WINDOW:-10s}"
      - "--cb-cooldown=${GATEWAY_CB_COOLDOWN:-5s}"
      - "--upstream-timeout=${GATEWAY_UPSTREAM_TIMEOUT:-10s}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_gw/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

  logagg-server:
    build:
      context: ./services/logagg
      dockerfile: Dockerfile.server
    image: udx-logagg-server:latest
    container_name: udx-logagg-server
    restart: unless-stopped
    command:
      - "--addr=:50051"
      - "--data=/app/data"
    volumes:
      - logagg-data:/app/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "50051"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

  logagg-agent:
    build:
      context: ./services/logagg
      dockerfile: Dockerfile.agent
    image: udx-logagg-agent:latest
    container_name: udx-logagg-agent
    restart: unless-stopped
    depends_on:
      logagg-server:
        condition: service_healthy
      backend:
        condition: service_healthy
    command:
      - "--file=/var/log/udx/app.jsonl"
      - "--server=logagg-server:50051"
      - "--source=udx-backend"
    volumes:
      # Read the same JSON-line log the backend writes to /app/logs.
      - backend-logs:/var/log/udx:ro
    networks: [udx]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Same-origin API — Nginx below reverse-proxies /api/* (through the
        # gateway) and /ws/* + /uploads/* (direct to backend:8000), so the
        # browser only ever talks to this host.
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: udx-frontend:latest
    container_name: udx-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [udx]

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
  backend-state:
  backend-logs:
  memdb-data:
  logagg-data:

networks:
  udx:
    driver: bridge
